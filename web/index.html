<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DubArabic AI - Upload</title>
    <style>
      :root {
        --border: #d9d9d9;
        --text: #111;
        --muted: #666;
        --bg-soft: #f7f7f7;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background: #fff;
      }

      .container {
        max-width: 820px;
        margin: 40px auto;
        padding: 16px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      .muted {
        color: var(--muted);
        margin-bottom: 20px;
      }

      .card {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px;
        background: #fff;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      @media (max-width: 700px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      label {
        display: block;
        font-weight: 700;
        margin-bottom: 8px;
      }

      input[type="file"],
      select {
        display: block;
        width: 100%;
        margin-bottom: 14px;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #fff;
        font-size: 14px;
      }

      .actions {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        margin-top: 8px;
      }

      button {
        padding: 10px 16px;
        border-radius: 10px;
        border: 1px solid #111;
        background: #111;
        color: #fff;
        cursor: pointer;
        font-size: 14px;
      }

      button:disabled {
        background: #999;
        border-color: #999;
        cursor: not-allowed;
      }

      .file-name {
        color: var(--muted);
        font-size: 14px;
      }

      progress {
        width: 100%;
        height: 16px;
        margin-top: 16px;
      }

      .log {
        background: var(--bg-soft);
        border-radius: 12px;
        padding: 14px;
        margin-top: 16px;
        white-space: pre-wrap;
        word-break: break-word;
        display: none;
      }

      .hint {
        color: var(--muted);
        font-size: 13px;
        margin-top: -8px;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>DubArabic AI</h1>
      <p class="muted">
        ارفع الفيديو → التخزين في Supabase → تشغيل الـ Pipeline تلقائيًا
      </p>

      <section class="card">
        <div class="grid">
          <div>
            <label for="file">اختيار الفيديو</label>
            <input id="file" type="file" accept="video/*" />
            <div id="fileName" class="file-name">لم يتم اختيار ملف بعد</div>
          </div>

          <div>
            <label for="processingMode">نوع المعالجة</label>
            <select id="processingMode">
              <option value="dub_and_subs">دبلجة + ترجمة</option>
              <option value="subtitles_only">ترجمة فقط بدون دبلجة</option>
            </select>

            <label for="dialect">لهجة الدبلجة</label>
            <select id="dialect">
              <option value="msa">العربية الفصحى</option>
              <option value="gulf">الخليجية</option>
              <option value="egyptian">المصرية</option>
              <option value="levantine">الشامية</option>
              <option value="sudanese">السودانية</option>
            </select>

            <label for="subtitleMode">نوع الترجمة على الشاشة</label>
            <select id="subtitleMode">
              <option value="soft">Soft subtitles</option>
              <option value="burned">Burned subtitles</option>
              <option value="none">بدون ترجمة على الشاشة</option>
            </select>

            <div class="hint">
              لو اخترت “ترجمة فقط بدون دبلجة”، فلن يتم توليد صوت عربي.
            </div>
          </div>
        </div>

        <div class="actions">
          <button id="btn" disabled>رفع الفيديو</button>
        </div>

        <progress id="prog" value="0" max="100"></progress>
        <div id="out" class="log"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
