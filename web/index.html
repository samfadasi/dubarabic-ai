<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DubArabic AI - Upload</title>
    <style>
      :root {
        --border: #d9d9d9;
        --text: #111;
        --muted: #666;
        --bg-soft: #f7f7f7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background: #fff;
      }

      .container {
        max-width: 760px;
        margin: 40px auto;
        padding: 16px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      .muted {
        color: var(--muted);
        margin-bottom: 20px;
      }

      .card {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px;
        background: #fff;
      }

      label {
        display: block;
        font-weight: 700;
        margin-bottom: 8px;
      }

      input[type="file"] {
        display: block;
        width: 100%;
        margin-bottom: 14px;
      }

      .actions {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }

      button {
        padding: 10px 16px;
        border-radius: 10px;
        border: 1px solid #111;
        background: #111;
        color: #fff;
        cursor: pointer;
        font-size: 14px;
      }

      button:disabled {
        background: #999;
        border-color: #999;
        cursor: not-allowed;
      }

      .file-name {
        color: var(--muted);
        font-size: 14px;
      }

      progress {
        width: 100%;
        height: 16px;
        margin-top: 16px;
      }

      .log {
        background: var(--bg-soft);
        border-radius: 12px;
        padding: 14px;
        margin-top: 16px;
        white-space: pre-wrap;
        word-break: break-word;
        display: none;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>DubArabic AI</h1>
      <p class="muted">ارفع الفيديو → التخزين في Supabase → تشغيل الـ Pipeline تلقائياً</p>

      <section class="card">
        <label for="file">اختيار الفيديو</label>
        <input id="file" type="file" accept="video/*" />

        <div class="actions">
          <button id="btn" disabled>رفع الفيديو</button>
          <span id="fileName" class="file-name">لم يتم اختيار ملف بعد</span>
        </div>

        <progress id="prog" value="0" max="100"></progress>

        <div id="out" class="log"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
